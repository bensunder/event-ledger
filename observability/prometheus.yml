global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'event-gateway'
    static_configs:
      - targets: ['event-ledger-gateway:8000']
    metrics_path: '/actuator/prometheus'

  - job_name: 'account-service'
    static_configs:
      - targets: ['event-ledger-account:8001']
    metrics_path: '/actuator/prometheus'
