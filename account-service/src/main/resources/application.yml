server:
  port: 8001

spring:
  application:
    name: account-service
  datasource:
    url: jdbc:h2:file:/data/accountdb;AUTO_SERVER=TRUE;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  data:
    jdbc:
      dialect: h2
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics,info
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      service: account-service

logging:
  level:
    com.eventledger: DEBUG
