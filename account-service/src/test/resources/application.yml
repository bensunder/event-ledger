spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  data:
    jdbc:
      dialect: h2
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

management:
  server:
    port: -1
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics,info