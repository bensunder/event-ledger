spring:
  application:
    name: event-gateway-test
  datasource:
    url: jdbc:h2:mem:gatewaytestdb;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

account-service:
  url: http://localhost:${wiremock.port:8099}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

resilience4j:
  bulkhead:
    instances:
      account-service:
        maxConcurrentCalls: 25
  retry:
    instances:
      account-service:
        maxAttempts: 2
        waitDuration: 50ms
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException
  circuitbreaker:
    instances:
      account-service:
        slidingWindowSize: 4
        failureRateThreshold: 50
        waitDurationInOpenState: 2s
        permittedNumberOfCallsInHalfOpenState: 2
        recordExceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException

logging:
  level:
    com.eventledger: DEBUG
