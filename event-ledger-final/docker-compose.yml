version: "3.9"

services:
  account-service:
    build:
      context: ./account-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:h2:mem:accountdb;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE"
      SERVER_PORT: "8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  event-gateway:
    build:
      context: ./event-gateway
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      ACCOUNT_SERVICE_URL: "http://account-service:8001"
      SPRING_DATASOURCE_URL: "jdbc:h2:mem:gatewaydb;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE"
      SERVER_PORT: "8000"
    depends_on:
      account-service:
        condition: service_healthy
