spring:
  application:
    name: account-service
  datasource:
    # DATABASE_TO_LOWER=TRUE: H2 stores identifiers lowercase to match Spring Data JDBC quoted queries
    url: jdbc:h2:mem:accountdb;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  data:
    jdbc:
      repositories:
        enabled: true

server:
  port: 8001

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.eventledger: INFO
